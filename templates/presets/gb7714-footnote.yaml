format_spec_version: 1
meta:
  name: "GB/T 7714 页下注"
  description: "GB/T 7714 页下注基础投稿模板"
  source: "preset"
page:
  paper_size: "A4"
  top_margin: "2.54cm"
  bottom_margin: "2.54cm"
  left_margin: "3.17cm"
  right_margin: "3.17cm"
  columns: 1
paragraph:
  font:
    family: "宋体"
    latin_family: "Times New Roman"
    size: "12pt"
  align: "justify"
  line_height: 1.25
  first_line_indent: "2em"
headings:
  "1":
    level: 1
    font:
      family: "黑体"
      size: "14pt"
    align: "center"
    first_line_indent: null
    auto_number: true
    numbering: "chinese"
  "2":
    level: 2
    font:
      family: "黑体"
      size: "12pt"
    align: "left"
    first_line_indent: null
    auto_number: true
    numbering: "chinese_paren"
  "3":
    level: 3
    font:
      family: "黑体"
      size: "12pt"
    align: "left"
    first_line_indent: null
    auto_number: true
    numbering: "arabic"
front_matter:
  title:
    font:
      family: "黑体"
      size: "16pt"
    align: "center"
    first_line_indent: null
  authors:
    font:
      family: "宋体"
      size: "12pt"
    align: "center"
    first_line_indent: null
  abstract:
    font:
      family: "楷体"
      size: "12pt"
    align: "justify"
    first_line_indent: null
  keywords:
    font:
      family: "楷体"
      size: "12pt"
    align: "justify"
    first_line_indent: null
citations:
  style: "numbered"
  position: "footnote"
  format_string: "{number}"
  superscript: true
references:
  enabled: false
  title:
    font:
      family: "黑体"
      size: "12pt"
    align: "center"
    first_line_indent: null
  entry:
    font:
      family: "宋体"
      size: "10.5pt"
    align: "justify"
    first_line_indent: "2em"
  sort_by: "appearance"
  hanging_indent: "0pt"
  numbering_style: "numbered"
figures_tables:
  three_line_table: true
advanced_word:
  widow_control: true
  use_document_grid: false
  latin_line_break: true
rules:
  - path: "citations.position"
    description: "第一版只记录页下注格式，复杂脚注互转需人工确认"
unresolved_items: []
